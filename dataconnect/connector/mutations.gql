mutation InsertKanjiMaster(
  $character: String!,
  $onyomi: [String!]!,
  $kunyomi: [String!]!,
  $meanings: [String!]!,
  $frequency: Int
) @auth(level: NO_ACCESS) {
  kanjiMaster_insert(data: {
    character: $character,
    onyomi: $onyomi,
    kunyomi: $kunyomi,
    meanings: $meanings,
    frequency: $frequency
  })
}

mutation CreatePhotoSession(
  $userId: String!,
  $imageUrl: String
) @auth(level: NO_ACCESS) {
  photoSession_insert(data: {
    userId: $userId,
    imageUrl: $imageUrl
  })
}

mutation UpdatePhotoSessionResult(
  $id: UUID!,
  $rawAiResponse: String,
  $costMicrodollars: Int64
) @auth(level: NO_ACCESS) {
  photoSession_update(id: $id, data: {
    rawAiResponse: $rawAiResponse,
    costMicrodollars: $costMicrodollars
  })
}

mutation InsertUserKanji(
  $userId: String!,
  $kanjiId: UUID!,
  $status: UserKanjiStatus!,
  $sourcePhotoId: UUID
) @auth(level: NO_ACCESS) {
  userKanji_insert(data: {
    userId: $userId,
    kanjiId: $kanjiId,
    status: $status,
    sourcePhotoId: $sourcePhotoId
  })
}

mutation InsertWordMaster(
  $word: String!,
  $reading: String!,
  $meanings: [String!]!,
  $kanjiIds: [UUID!]!
) @auth(level: NO_ACCESS) {
  wordMaster_insert(data: {
    word: $word,
    reading: $reading,
    meanings: $meanings,
    kanjiIds: $kanjiIds
  })
}

mutation InsertUserWord(
  $userId: String!,
  $wordMasterId: UUID!,
  $kanjiIds: [UUID!]!,
  $source: WordSource,
  $discoveredViaKanjiId: UUID
) @auth(level: NO_ACCESS) {
  userWords_insert(data: {
    userId: $userId,
    wordMasterId: $wordMasterId,
    kanjiIds: $kanjiIds,
    source: $source,
    discoveredViaKanjiId: $discoveredViaKanjiId
  })
}

mutation InsertQuizGenerationJob(
  $userId: String!,
  $kanjiId: UUID!,
  $wordMasterId: UUID
) @auth(level: NO_ACCESS) {
  quizGenerationJob_insert(data: {
    userId: $userId,
    kanjiId: $kanjiId,
    wordMasterId: $wordMasterId
  })
}
