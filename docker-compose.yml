services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-kanji-masta}
      FIREBASE_AUTH_EMULATOR_HOST: ${FIREBASE_AUTH_EMULATOR_HOST:-}
      FIREBASE_DATACONNECT_HOST: ${FIREBASE_DATACONNECT_HOST:-}
      FIREBASE_FUNCTIONS_HOST: ${FIREBASE_FUNCTIONS_HOST:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-demo-key}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-localhost}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-kanji-masta}
        VITE_FIREBASE_AUTH_EMULATOR_HOST: ${VITE_FIREBASE_AUTH_EMULATOR_HOST:-host.docker.internal:9099}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-kanji-masta.appspot.com}
        VITE_FIREBASE_STORAGE_EMULATOR_HOST: ${VITE_FIREBASE_STORAGE_EMULATOR_HOST:-host.docker.internal:9199}
    ports:
      - "3000:3000"
