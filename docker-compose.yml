services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
      SUPABASE_URL: http://host.docker.internal:54321
      AI_WORKER_URL: http://ai-worker:8080
      ADMIN_USER_ID: ${ADMIN_USER_ID:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-dev-key}
      SELF_URL: http://backend:8080
    depends_on:
      ai-worker:
        condition: service_healthy

  ai-worker:
    build: ./services/ai-worker
    ports:
      - "5001:8080"  # exposed for manual cron triggers
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
        VITE_SUPABASE_URL: ${SUPABASE_URL:-http://localhost:54321}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
